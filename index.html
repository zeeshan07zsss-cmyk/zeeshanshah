<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trading AI Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#101820;
    color:white;
}

header{
    background:#00b894;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

nav{
    background:#1e272e;
    padding:15px;
    display:flex;
    justify-content:center;
    gap:20px;
}

nav a{
    color:white;
    text-decoration:none;
    font-size:18px;
}

.container{
    width:95%;
    margin:auto;
    margin-top:20px;
}

.box{
    background:#1e272e;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

.status{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

.card{
    background:#2d3436;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

.chart{
    height:500px;
    background:black;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#00ff99;
    font-size:22px;
}

.signal{
    padding:15px;
    background:#0984e3;
    border-radius:10px;
    margin-top:15px;
}

footer{
    background:#1e272e;
    text-align:center;
    padding:15px;
    margin-top:30px;
}
</style>

</head>

<body>

<header>
Trading AI Dashboard
</header>

<nav>
<a href="#">Dashboard</a>
<a href="#">Signals</a>
<a href="#">Market</a>
<a href="#">Settings</a>
<a href="#">Admin</a>
</nav>

<div class="container">

<div class="box">

<h2>مارکیٹ اسٹیٹس</h2>

<div class="status">

<div class="card">
<h3>FVG</h3>
<p>Waiting...</p>
</div>

<div class="card">
<h3>Order Block</h3>
<p>Waiting...</p>
</div>

<div class="card">
<h3>BOS / CHoCH</h3>
<p>Waiting...</p>
</div>

</div>

</div>

<div class="box">

<h2>Live Chart</h2>

<div class="chart">

یہاں بعد میں Live Trading Chart آئے گا

</div>

<div class="signal">

<strong>Signal:</strong> ابھی کوئی سگنل موجود نہیں

</div>

</div>

</div>

<footer>

© 2026 Trading AI Dashboard

</footer>

</body>

</html>
